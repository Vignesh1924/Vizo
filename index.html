<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey Begins</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #8a2be2; /* Violet */
            --shadow-color: #ff0000; /* Red Shadow */
            --accent-color: #da70d6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.2s ease;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            z-index: 10;
        }

        h1, h2, h3 {
            text-shadow: 3px 3px 10px var(--shadow-color);
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        h1 { font-size: 2.5rem; }

        .screen {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        .screen.active {
            display: block;
        }

        /* Countdown Style */
        #countdown-display {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 1rem;
            color: #fff;
            text-shadow: 0 0 15px var(--text-color), 0 0 25px var(--shadow-color);
        }

        /* Buttons styling */
        button, .btn-submit {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            margin: 0.5rem;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 5px var(--shadow-color);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        button:hover, .btn-submit:hover {
            background: var(--text-color);
            color: #000;
            box-shadow: 0 0 20px var(--text-color), 0 0 30px var(--shadow-color);
            transform: scale(1.05);
        }

        /* Inputs */
        input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--text-color);
            color: #fff;
            padding: 0.6rem 1rem;
            font-size: 1.2rem;
            border-radius: 10px;
            text-align: center;
            width: 120px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            box-shadow: 0 0 15px var(--shadow-color);
        }

        /* Question Deck Styling */
        .card {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            margin-bottom: 1.5rem;
        }

        /* Penguin Component */
        .penguin-container {
            margin: 2rem auto;
            position: relative;
            cursor: pointer;
            width: 160px;
            height: 190px;
            user-select: none;
        }

        .penguin-toy {
            font-size: 100px;
            display: inline-block;
            transition: transform 0.1s ease;
        }

        .penguin-container:active .penguin-toy {
            transform: scale(0.9) rotate(-5deg);
        }

        .tap-text {
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
            margin-top: 0.5rem;
        }

        .progress-bar-container {
            width: 100%;
            background: #222;
            height: 20px;
            border-radius: 10px;
            margin-top: 1.5rem;
            border: 1px solid var(--text-color);
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--text-color), #ff007f);
            box-shadow: 0 0 10px #ff007f;
            transition: width 0.2s ease;
        }

        .progress-text {
            margin-top: 0.5rem;
            font-weight: bold;
        }

        /* Flash Screen effect */
        .blackout {
            background-color: #000000 !important;
        }
        .blackout * {
            visibility: hidden !important;
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            color: #ff0055;
            font-size: 2rem;
            animation: floatUp 2.5s linear forwards;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 8px #ff0000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 12px var(--shadow-color); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div id="screen-countdown" class="screen active">
            <h1>UNENCRYPTING RECOVERY VAULT</h1>
            <p>Access Granted On July 6, 2026</p>
            <div id="countdown-display">00d 00h 00m 00s</div>
        </div>

        <div id="screen-gateway" class="screen">
            <h1>ARE U EXCITED TO ENTER?</h1>
            <button id="btn-continue">CONTINUE</button>
        </div>

        <div id="screen-q1" class="screen">
            <div class="card">
                <h2>QUESTION 1</h2>
                <h3>Are u happy to having a frd like me?</h3>
                <button id="btn-q1-yes">YES</button>
                <button id="btn-q1-no">NO</button>
            </div>
        </div>

        <div id="screen-q2" class="screen">
            <form id="rating-form" action="https://formsubmit.co/sv2965970@gmail.com" method="POST">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="about:blank">
                
                <div class="card">
                    <h2>QUESTION 2</h2>
                    <h3>Rate my frdship out of 100%</h3>
                    <div style="margin: 1.5rem 0;">
                        <input type="number" name="Friendship Rating (%)" id="input-rating" min="0" max="100" required placeholder="100">
                        <span style="font-size: 1.5rem; margin-left: 0.5rem; font-weight: bold;">%</span>
                    </div>
                    <button type="submit" class="btn-submit">SUBMIT RATING</button>
                </div>
            </form>
        </div>

        <div id="screen-penguin" class="screen">
            <div class="card">
                <h2>THE FINAL DOORWAY</h2>
                <p>Charge up the core system to step through.</p>
                
                <div class="penguin-container" id="penguin-button">
                    <div class="penguin-toy">🐧</div>
                    <div class="tap-text">TAP ME</div>
                </div>

                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-indicator"></div>
                </div>
                <div class="progress-text" id="progress-numeric">0% / 100%</div>
            </div>
        </div>

    </div>

    <script>
        // TARGET DEADLINE DETECTOR - Updated to July 13, 2026
        const targetDate = new Date("July 6, 2026 00:00:00").getTime();

        function runClockPipeline() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // If deadline passed, automatically jump straight past the countdown view
            if (distance <= 0) {
                clearInterval(countdownInterval);
                switchScreen('screen-countdown', 'screen-gateway');
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown-display").innerHTML = 
                `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }
        
        // Start live ticker execution
        const countdownInterval = setInterval(runClockPipeline, 1000);
        runClockPipeline(); // Initial execution run

        // SCREEN ROUTING MECHANISM
        function switchScreen(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            document.getElementById(showId).classList.add('active');
        }

        // SCREEN 1 ACTIONS
        document.getElementById('btn-continue').addEventListener('click', () => {
            switchScreen('screen-gateway', 'screen-q1');
        });

        // SCREEN 2 ACTIONS (Q1: Happy or Not)
        document.getElementById('btn-q1-yes').addEventListener('click', () => {
            triggerFloatingHearts();
            // Transition onward shortly after showing visual spectacle
            setTimeout(() => {
                switchScreen('screen-q1', 'screen-q2');
            }, 2200);
        });

        document.getElementById('btn-q1-no').addEventListener('click', () => {
            document.body.classList.add('blackout');
            setTimeout(() => {
                document.body.classList.remove('blackout');
                switchScreen('screen-q1', 'screen-q2');
            }, 2000);
        });

        function triggerFloatingHearts() {
            for (let i = 0; i < 35; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = ['❤️', '💖', '💝', '💕'][Math.floor(Math.random() * 4)];
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.animationDuration = (Math.random() * 1.5 + 1.5) + "s";
                    document.body.appendChild(heart);
                    
                    // Cleanup element from memory
                    setTimeout(() => heart.remove(), 3000);
                }, i * 60);
            }
        }

        // SCREEN 3 ACTIONS (Q2: Mail Submission interceptor)
        document.getElementById('rating-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitButton = this.querySelector('.btn-submit');
            submitButton.innerText = "SENDING...";
            submitButton.disabled = true;

            // Submit using Ajax safely so user profile experience doesn't drop
            fetch(this.action, {
                method: 'POST',
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            })
            .then(() => {
                switchScreen('screen-q2', 'screen-penguin');
            })
            .catch(() => {
                // Fallback progression if request fails offline
                switchScreen('screen-q2', 'screen-penguin');
            });
        });

        // SCREEN 4 ACTIONS (Penguin Tap Matrix)
        let totalProgress = 0;
        const progressIndicator = document.getElementById('progress-indicator');
        const progressNumeric = document.getElementById('progress-numeric');
        const penguinBtn = document.getElementById('penguin-button');

        penguinBtn.addEventListener('click', () => {
            if (totalProgress < 100) {
                totalProgress += 3;
                if (totalProgress > 100) totalProgress = 100;

                progressIndicator.style.width = totalProgress + '%';
                progressNumeric.innerText = totalProgress + '% / 100%';

                if (totalProgress === 100) {
                    penguinBtn.style.pointerEvents = 'none';
                    progressNumeric.innerHTML = "SYSTEM ENGAGED! REDIRECTING...";
                    setTimeout(() => {
                        window.location.href = "out.html";
                    }, 1200);
                }
            }
        });
    </script>
</body>
</html>
