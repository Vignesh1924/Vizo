<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Dark Red Surprise 💖 Lizard Theme</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root {
    --primary: #ff1e43; /* Vivid Crimson Red */
    --primary-glow: rgba(255, 30, 67, 0.6);
    --gold: #dfb76c;
    --bg-dark: #0a0506; /* Deep Luxurious Charcoal Black */
    --envelope-dark: #99001a;
    --envelope-light: #ff1e43;
    --text-light: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    overflow-x: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Poppins', sans-serif;
}

/* 3D LIZARD BACKDROP CANVAS */
#lizardCanvas {
    position: fixed;
    inset: 0;
    z-index: -5;
    pointer-events: none;
}

/* Ambient Background Light Gradient */
.overlay {
    position: fixed;
    inset: 0;
    background: 
    radial-gradient(circle at 30% 20%, rgba(153, 0, 26, 0.4), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(10, 5, 6, 0.9), transparent 60%),
    linear-gradient(to bottom, rgba(10,5,6,0.5), rgba(10,5,6,0.95));
    z-index: -4;
}

/* Floating Particles */
.particle {
    position: fixed;
    background: #ff1e43;
    border-radius: 50%;
    pointer-events: none;
    z-index: -2;
    box-shadow: 0 0 8px #ff1e43, 0 0 15px #ff1e43;
    animation: flashBlink 0.00001s infinite alternate !important;
}

@keyframes flashBlink {
    0% { opacity: 0.1; }
    100% { opacity: 1; }
}

@keyframes floatUp {
    0% { transform: translateY(105vh) scale(0.3); }
    100% { transform: translateY(-10vh) scale(1.2); }
}

/* INTRO SCREEN */
#intro {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #1f0b0e 0%, #0a0506 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10000;
    transition: opacity 1.2s cubic-bezier(0.77, 0, 0.175, 1);
}

.logo {
    font-family: 'Cinzel', serif;
    font-size: 72px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 6px;
    text-shadow: 0 0 15px var(--primary-glow), 0 0 40px var(--primary);
    animation: pulseGlow 2.5s infinite ease-in-out;
    text-align: center;
}

@keyframes pulseGlow {
    0%, 100% { transform: scale(0.98); opacity: 0.9; text-shadow: 0 0 15px var(--primary-glow); }
    50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 35px var(--primary), 0 0 60px var(--primary-glow); }
}

.enter-btn {
    margin-top: 40px;
    padding: 18px 45px;
    border: 1px solid rgba(255, 30, 67, 0.4);
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    background: linear-gradient(45deg, var(--envelope-light), var(--envelope-dark));
    color: white;
    box-shadow: 0 10px 30px rgba(255, 30, 67, 0.4);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.enter-btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 15px 40px rgba(255, 30, 67, 0.7);
    border-color: var(--primary);
}

/* MAIN VIEWPORT */
#main {
    display: none;
    min-height: 100vh;
    padding: 60px 20px;
    position: relative;
    z-index: 10;
}

/* Envelope UI Structure */
#envelopeSection {
    min-height: 50vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    perspective: 1500px;
}

.envelope-title {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-align: center;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(255, 30, 67, 0.6);
}

.envelope {
    width: 400px;
    height: 260px;
    position: relative;
    cursor: pointer;
    background: linear-gradient(135deg, var(--envelope-light), var(--envelope-dark));
    border-radius: 0 0 15px 15px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(255, 30, 67, 0.3);
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
}

.envelope:hover {
    transform: translateY(-5px) rotateX(5deg);
}

.flap {
    position: absolute;
    top: 0; left: 0; width: 0; height: 0;
    border-left: 200px solid transparent;
    border-right: 200px solid transparent;
    border-top: 150px solid var(--envelope-light);
    transform-origin: top;
    transition: transform 0.8s ease-in-out, z-index 0.2s 0.4s;
    z-index: 5;
}

.envelope.open .flap {
    transform: rotateX(180deg);
    z-index: 1;
    border-top-color: var(--envelope-dark);
}

/* WRITTEN LETTER - Optimized text wrap style */
.letter-wrapper {
    max-height: 0;
    overflow: hidden;
    transition: max-height 2s cubic-bezier(0.1, 1, 0.1, 1);
    width: 100%;
    display: flex;
    justify-content: center;
}

.letter {
    width: 100%;
    max-width: 750px;
    padding: 50px 45px;
    margin: 40px auto;
    border-radius: 12px;
    position: relative;
    background: linear-gradient(135deg, rgba(31, 11, 14, 0.97) 0%, rgba(10, 5, 6, 0.99) 100%);
    box-shadow: 
        inset 0 0 30px rgba(255, 30, 67, 0.2),
        0 20px 50px rgba(0,0,0,0.7);
    border: 1px solid rgba(255, 30, 67, 0.3);
    transform: scale(0.9) translateY(40px);
    opacity: 0;
    transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s;
}

.letter::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(255, 30, 67, 0.3);
    pointer-events: none;
}

.letter.show {
    transform: scale(1) translateY(0);
    opacity: 1;
}

.text {
    font-family: 'Great Vibes', cursive;
    font-size: 26px;
    line-height: 1.6;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255, 30, 67, 0.8);
    min-height: 200px;
    text-align: left;
    word-wrap: break-word;
}

/* INTERACTIVE GIFTS STRUCTURE */
#gifts {
    display: none;
    justify-content: center;
    gap: 60px;
    margin: 80px auto 40px;
    max-width: 900px;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity 1s ease;
}

.gift-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.dog-gift {
    width: 180px;
    height: 180px;
    background: linear-gradient(135deg, #b81d36 0%, #6e0010 100%);
    border-radius: 40px 40px 30px 30px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset -5px -5px 15px rgba(0,0,0,0.3);
    border: 1px solid rgba(255, 30, 67, 0.4);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.dog-gift::before, .dog-gift::after {
    content: '';
    position: absolute;
    top: -10px; width: 45px; height: 80px;
    background: #dfb76c;
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}
.dog-gift::before { left: -10px; transform: rotate(-15deg); transform-origin: top right; }
.dog-gift::after { right: -10px; transform: rotate(15deg); transform-origin: top left; }

.dog-snout {
    position: absolute;
    bottom: 35px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 45px; background: #fffafa; border-radius: 50%;
}
.dog-nose {
    position: absolute;
    top: 5px; left: 50%; transform: translateX(-50%);
    width: 22px; height: 14px; background: #2c2c2c; border-radius: 10px 10px 15px 15px;
}

.dog-eye {
    position: absolute;
    top: 55px; width: 16px; height: 16px; background: #111; border-radius: 50%;
    box-shadow: inset 0 0 4px white;
}
.dog-eye.left { left: 40px; }
.dog-eye.right { right: 40px; }

.click-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-dark);
    color: var(--primary);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 0 10px var(--primary-glow);
    animation: bounce 1.5s infinite alternate;
    pointer-events: none;
    border: 1px solid var(--primary);
}

@keyframes bounce {
    0% { transform: translate(-50%, -40%); }
    100% { transform: translate(-50%, -60%); }
}

.dog-gift:hover {
    transform: translateY(-12px) scale(1.04);
    box-shadow: 0 30px 50px rgba(255, 30, 67, 0.4);
}

.progress-container {
    width: 100%;
    max-width: 180px;
    background: rgba(255,255,255,0.05);
    height: 8px;
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
    opacity: 0;
    border: 1px solid rgba(255,30,67,0.2);
    transition: opacity 0.3s;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--gold));
    border-radius: 10px;
}
.progress-text {
    font-size: 13px;
    color: #ffffff;
    margin-top: 6px;
    font-weight: 600;
    opacity: 0;
}

/* REVEAL DIALOG MODAL LAYOUT */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(10, 5, 6, 0.94);
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}
.modal.active {
    opacity: 1;
    pointer-events: auto;
}
.modal-content {
    width: 90%;
    max-width: 520px;
    padding: 40px 30px;
    border-radius: 24px;
    background: #14080a;
    border: 1px solid rgba(255, 30, 67, 0.4);
    box-shadow: 0 30px 70px rgba(0,0,0,0.9), 0 0 30px rgba(255,30,67,0.2);
    transform: scale(0.85);
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    position: relative;
}
.modal.active .modal-content {
    transform: scale(1);
}

/* Fixed Close Button Structure */
.close-modal-btn {
    position: absolute;
    top: -20px;
    right: -20px;
    background: #ff1e43;
    border: 2px solid #ffffff;
    color: #ffffff;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s, background 0.2s;
    z-index: 99999;
}
.close-modal-btn:hover {
    background: #99001a;
    transform: scale(1.1);
}

/* Dynamic Download Button Styling Layout */
.download-btn-container {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
}

.download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #ff1e43, #99001a);
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 5px 15px rgba(255,30,67,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
}
.download-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255,30,67,0.6);
}

.modal-content img {
    width: 100%;
    max-height: 380px;
    object-fit: cover;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,30,67,0.2);
}

/* FOOTER SIGN OFF */
.thank {
    text-align: center;
    margin-top: 80px;
    font-size: 48px;
    font-family: 'Great Vibes', cursive;
    color: #ffffff;
    text-shadow: 0 0 15px var(--primary);
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.5s ease;
}

@media(max-width: 768px){
    .logo { font-size: 42px; }
    .envelope { width: 300px; height: 195px; }
    .flap { border-left-width: 150px; border-right-width: 150px; border-top-width: 112px; }
    .text { font-size: 22px; }
    .dog-gift { width: 140px; height: 140px; }
    .close-modal-btn { top: -15px; right: -15px; }
}
</style>
</head>
<body>

<canvas id="lizardCanvas"></canvas>
<div class="overlay"></div>

<div id="intro">
    <div class="logo">WELCOME 💖</div>
    <button class="enter-btn" onclick="enterSite()">Enter Surprise ✨🦎</button>
</div>

<div id="main">
    <div id="envelopeSection">
        <h1 class="envelope-title">Open Your Surprise 💖</h1>
        <div class="envelope" id="envelopeContainer" onclick="openLetter()">
            <div class="flap"></div>
        </div>
    </div>

    <div class="letter-wrapper" id="letterWrapper">
        <div class="letter" id="letter">
            <div class="text" id="typingText"></div>
        </div>
    </div>

    <div id="gifts">
        <div class="gift-container">
            <div class="dog-gift" onclick="processGiftBox(1)">
                <div class="dog-eye left"></div>
                <div class="dog-eye right"></div>
                <div class="dog-snout"><div class="dog-nose"></div></div>
                <div class="click-badge">Click Me</div>
            </div>
            <div class="progress-container" id="p-container-1"><div class="progress-bar" id="p-bar-1"></div></div>
            <div class="progress-text" id="p-text-1">0%</div>
        </div>

        <div class="gift-container">
            <div class="dog-gift" onclick="processGiftBox(2)">
                <div class="dog-eye left"></div>
                <div class="dog-eye right"></div>
                <div class="dog-snout"><div class="dog-nose"></div></div>
                <div class="click-badge">Click Me</div>
            </div>
            <div class="progress-container" id="p-container-2"><div class="progress-bar" id="p-bar-2"></div></div>
            <div class="progress-text" id="p-text-2">0%</div>
        </div>
    </div>
<div class="thank" id="thankText">
    Even if this webpage doesn't look great to you,<br>
    the words in my letter are meant just for you.<br><br>
    Thank You For Everything 💖
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close-modal-btn" onclick="closeModal()">✕</button>
        
        <div id="giftOneContent" style="display:none;">
            <img id="modalImg" src="" alt="Surprise Asset Mapping Source">
            <div class="download-btn-container">
                <a id="modalDownloadBtn" class="download-btn" href="" download="Surprise_Image.jpg">Download Image 📥</a>
            </div>
        </div>
        
        <div id="modalTextContainer" style="display:none; color: white; font-size: 20px; padding: 20px 0; font-family: 'Poppins', sans-serif;"></div>
    </div>
</div>

<script>
/* GENERATE BACKGROUND PARTICLES */
for(let i=0; i<65; i++){
    let p = document.createElement("div");
    p.className = "particle";
    let size = Math.random() * 4 + 1.5;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animation = `floatUp ${5 + Math.random() * 7}s linear infinite`;
    p.style.animationDelay = `-${Math.random() * 6}s`;
    document.body.appendChild(p);
}

function enterSite(){
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";
    setTimeout(() => {
        intro.style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 1200);
}

let typingTriggered = false;
function openLetter(){
    if(typingTriggered) return;
    typingTriggered = true;
    document.getElementById("envelopeContainer").classList.add("open");

    setTimeout(() => {
        document.getElementById("letterWrapper").style.maxHeight = "2500px"; 
        document.getElementById("letter").classList.add("show");
        setTimeout(() => { typeText(); }, 600);
    }, 800);
}

function typeText(){
    const narrative = `Our friendship has lasted for one year, filled with sadness, happiness, madness, and surprises. We never expected to become this close. On this day, we first started talking by miracle, and after that you believed in me and chatted with me daily. That trust, without even knowing me fully, is the one thing I like most about you.\n\nIn the beginning, we chatted every day, and though there were some unsuccessful plans that made you feel uncomfortable, later you stepped back with mood swings. But even then, I never left you — I tried to connect with you and give advice. At first, I expected a lot of things from you, but when they didn’t happen, I realized and let them go.\n\nAfter 4th semester, I felt you reduced talking to me during holidays. But then, like a miracle, you started calling me every evening while returning home from your internship. Those bus calls made me so happy and gave me unexpressed feelings.  you are special in a way that’s hard to believe. I mostly listen to your words and stories, but I’m sorry I can’t explain mine in the same way. I believe you know the reason.\n\nLooking back over these past twelve months, I notice how much we have grown together through the quiet moments just as much as the loud ones. The happiness and excitement in your eyes when we meet makes me even happier, though not like the early plans we once made. As far as I know, I never hated you or did anything wrong to you. In this one year, there may not be many memories, but I believe more will be created in the next two years. I will never force you to do anything — if you wish, ask me, and if you don’t, I’ll leave it, even if it makes me feel sad.\n\nEvery time you share a piece of your day, your triumphs, or even your smallest frustrations, it reminds me of how rare it is to find someone so genuine. From now on, I hope more good things will happen. I also know about your situation at home and in class, so feel free to share anything with me — good or bad. I’ll always be here to listen and stand by you. No matter how busy life gets, or what changes come our way, this bond remains unchanged.\n\nFinally, I hope our friendship lasts forever with happiness. Let's make the absolute most of the days ahead, creating beautiful memories.`;

    let step = 0;
    const targetElement = document.getElementById("typingText");
    targetElement.innerHTML = "";

    function playTyping() {
        if(step < narrative.length){
            let char = narrative.charAt(step);
            if (char === '\n') {
                targetElement.innerHTML += '<br>';
            } else {
                targetElement.innerHTML += char;
            }
            step++;
            setTimeout(playTyping, 20); // Slightly faster typing for the longer message
        } else {
            const giftSec = document.getElementById("gifts");
            giftSec.style.display = "flex";
            setTimeout(() => { giftSec.style.opacity = "1"; }, 100);
        }
    }
    playTyping();
}

let dynamicLockout = { 1: false, 2: false };

function processGiftBox(boxId) {
    if(dynamicLockout[boxId]) return;
    dynamicLockout[boxId] = true;

    document.getElementById(`p-container-${boxId}`).style.opacity = "1";
    document.getElementById(`p-text-${boxId}`).style.opacity = "1";

    let counts = 0;
    let timingLoop = setInterval(() => {
        counts += Math.floor(Math.random() * 4) + 4; 
        if(counts >= 100) {
            counts = 100;
            clearInterval(timingLoop);
            triggerGiftPayload(boxId);
        }
        document.getElementById(`p-bar-${boxId}`).style.width = counts + "%";
        document.getElementById(`p-text-${boxId}`).innerText = counts + "%";
    }, 35);
}

function triggerGiftPayload(boxId) {
    const modal = document.getElementById("modal");
    const giftOneContent = document.getElementById("giftOneContent");
    const mImg = document.getElementById("modalImg");
    const mDLBtn = document.getElementById("modalDownloadBtn");
    const mTxt = document.getElementById("modalTextContainer");

    giftOneContent.style.display = "none";
    mTxt.style.display = "none";

    if(boxId === 1) {
    // 1. Change this to the exact name and path of your image file
    const localImage = "wish.jpeg"; 
    
    mImg.src = localImage; 
    mDLBtn.href = localImage; 
    
    // This will force the browser to download it with this name
    mDLBtn.download = "wish-downloaded.jpeg"; 
    
    giftOneContent.style.display = "block";
}
    else {
        mTxt.innerText = "Spending the whole day hanging out at the mall, catching a movie, hitting the amusement park, and ending it at the beach--If u wish🌊🍽️";
        mTxt.style.display = "block";
    }

    setTimeout(() => {
        modal.classList.add("active");
        document.getElementById("thankText").style.opacity = "1";
        document.getElementById("thankText").style.transform = "translateY(0)";
    }, 300);
}

function closeModal(){
    document.getElementById("modal").classList.remove("active");
}
</script>

<script>
const canvas = document.getElementById("lizardCanvas");
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 10);

const centralLizard = new THREE.Group();
const vibrantRed = 0xff1e43;
const charcoalBronze = 0x3a2326;

const materialWire = new THREE.MeshBasicMaterial({ color: vibrantRed, wireframe: true, transparent: true, opacity: 0.25 });
const materialCore = new THREE.MeshStandardMaterial({ color: charcoalBronze, roughness: 0.4, metalness: 0.7 });

const bodyGeo = new THREE.TorusGeometry(3, 0.25, 16, 100);
bodyGeo.rotateX(Math.PI/2);
const bodyHub = new THREE.Mesh(bodyGeo, materialCore);
centralLizard.add(bodyHub);

const geometryRing = new THREE.CylinderGeometry(4.3, 4.3, 0.15, 64, 1, true);
geometryRing.rotateX(Math.PI/2);
centralLizard.add(new THREE.Mesh(geometryRing, materialWire));

const geometryExpanded = new THREE.OctahedronGeometry(1.6);
geometryExpanded.rotateY(Math.PI/4);
centralLizard.add(new THREE.Mesh(geometryExpanded, materialCore));

for(let i=0; i<4; i++) {
    const limb = new THREE.Group();
    const limbSegmentGeo = new THREE.BoxGeometry(0.35, 1.9, 0.35);
    const segmentMatRed = new THREE.MeshBasicMaterial({ color: vibrantRed, transparent: true, opacity: 0.15 });
    
    limb.add(new THREE.Mesh(limbSegmentGeo, materialCore));
    limb.add(new THREE.Mesh(limbSegmentGeo, materialWire));
    
    const angle = (i * Math.PI / 2) + Math.PI/4;
    limb.position.set(2.8 * Math.cos(angle), -0.4, 2.8 * Math.sin(angle));
    limb.rotation.z = Math.PI / 5;
    centralLizard.add(limb);
}

const geometryTail = new THREE.CylinderGeometry(0.15, 0.65, 2.7, 16);
geometryTail.rotateX(Math.PI/2);
const meshTail = new THREE.Mesh(geometryTail, materialCore);
meshTail.position.set(0, -1.5, -3.2);
centralLizard.add(meshTail);

centralLizard.scale.set(1.4, 1.4, 1.4);
scene.add(centralLizard);

scene.add(new THREE.AmbientLight(0xffffff, 0.2));
const redPulseLight = new THREE.PointLight(vibrantRed, 3, 30);
redPulseLight.position.set(-5, 5, 5);
scene.add(redPulseLight);

let systemClock = 0;
function animateLizard() {
    requestAnimationFrame(animateLizard);
    systemClock += 0.01;

    centralLizard.rotation.y = Math.sin(systemClock * 0.25) * 0.12;
    centralLizard.rotation.x = Math.cos(systemClock * 0.2) * 0.06;
    centralLizard.position.y = Math.sin(systemClock * 0.7) * 0.12;

    if(Math.random() > 0.4) {
        redPulseLight.intensity = Math.random() * 3.5 + 0.5;
    }
    renderer.render(scene, camera);
}
animateLizard();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
