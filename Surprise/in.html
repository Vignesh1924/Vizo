<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Like Me?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e8,#ffe8f3,#fff0f6);
    position:relative;
}

/* Floating Hearts */
.heart{
    position:absolute;
    font-size:20px;
    animation:floatUp linear infinite;
    opacity:0.7;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Main Card */
.container{
    width:420px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    border:1px solid rgba(255,255,255,0.3);
    z-index:10;
}

/* Cat Image */
.cat{
    width:220px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(255,105,180,0.4);
    animation:floatCat 3s ease-in-out infinite;
}

@keyframes floatCat{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Question */
.question{
    margin-top:20px;
    font-size:28px;
    font-weight:700;
    color:#ff4081;
}

/* Cute Text */
.text{
    color:#555;
    margin-top:8px;
    font-size:15px;
}

/* Buttons */
.buttons{
    margin-top:25px;
}

button{
    border:none;
    padding:14px 35px;
    font-size:18px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
    margin:10px;
    position:relative;
}

.yes-btn{
    background:linear-gradient(45deg,#ff4081,#ff6fa5);
    color:white;
    box-shadow:0 5px 20px rgba(255,64,129,0.4);
}

.yes-btn:hover{
    transform:scale(1.1);
}

.no-btn{
    background:#fff;
    color:#ff4081;
    border:2px solid #ff4081;
    transition:0.2s;
}

/* Dark Screen */
#darkScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    visibility:hidden;
    z-index:999;
    transition:0.3s;
}

/* Butterfly */
.butterfly{
    position:absolute;
    font-size:28px;
    animation:flyUp 5s linear;
}

@keyframes flyUp{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) translateX(80px);
        opacity:0;
    }
}

/* Sparkle */
.light{
    position:absolute;
    width:7px;
    height:7px;
    background:gold;
    border-radius:50%;
    box-shadow:0 0 15px gold;
    animation:glow 4s linear;
}

@keyframes glow{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

</style>
</head>
<body>



<div class="container">

    <img src="me.jpeg" class="cat">

    <div class="question">
        Do You Like Me? ❤️
    </div>

    <div class="text">
        Choose wisely 😆💕
    </div>

    <div class="buttons">
        <button class="yes-btn" onclick="goYes()">
            Yes 💖
        </button>

        <button class="no-btn" id="noBtn">
            No 😭
        </button>
    </div>
</div>

<div id="darkScreen"></div>

<script>

// YES -> ok.html
function goYes(){
    window.location.href="ok.html";
}

// NO BUTTON FLY AWAY
const noBtn=document.getElementById("noBtn");

document.addEventListener("mousemove",(e)=>{

    const rect=noBtn.getBoundingClientRect();

    const x=rect.left+rect.width/2;
    const y=rect.top+rect.height/2;

    const distance=Math.hypot(
        e.clientX-x,
        e.clientY-y
    );

    // If mouse comes near
    if(distance < 100){

        const newX=Math.random()*
        (window.innerWidth-150);

        const newY=Math.random()*
        (window.innerHeight-80);

        noBtn.style.position="fixed";
        noBtn.style.left=newX+"px";
        noBtn.style.top=newY+"px";
    }
});



// LIGHT SPARKLES
setInterval(()=>{

    let l=document.createElement("div");
    l.className="light";

    l.style.left=Math.random()*100+"vw";
    l.style.top="100vh";

    document.body.appendChild(l);

    setTimeout(()=>{
        l.remove();
    },4000);

},150);

</script>

</body>
</html>
