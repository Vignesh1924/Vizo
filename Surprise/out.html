<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cute Passcode</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #1c1c1c;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌹 BORDER */
.border-img {
    position: fixed;
    inset: 0;
    background: url("border.png") no-repeat center;
    background-size: 100% 100%;
    pointer-events: none;
    z-index: 0;
}

/* ✨ GLOW BORDER */
.glow-border {
    position: fixed;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    z-index: 1;

    box-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff69b4,
        0 0 40px #ff1493,
        0 0 60px #ff1493;
    
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
    0% {
        box-shadow: 0 0 5px #ff69b4, 0 0 10px #ff69b4, 0 0 20px #ff1493;
    }
    100% {
        box-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493, 0 0 60px #ff1493;
    }
}

/* CONTENT */
.container {
    display: flex;
    gap: 60px;
    align-items: center;
    padding: 80px;
    position: relative;
    z-index: 5;
}

/* TITLE */
.title {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #d6006e;
    text-shadow: 2px 2px 10px white;
}

/* IMAGE */
.photo-box {
    background: white;
    padding: 15px;
    padding-bottom: 50px;
    border-radius: 10px;
    position: relative;
}

.photo-box img {
    width: 250px;
    height: 300px;
    object-fit: cover;
    border-radius: 8px;
}

.ribbon {
    position: absolute;
    top: -10px;
    right: -10px;
    font-size: 40px;
}

.bunny {
    position: absolute;
    bottom: -30px;
    left: -20px;
    font-size: 40px;
}

/* KEYPAD */
.keypad {
    text-align: center;
    color: #d6006e;
}

.display {
    font-size: 28px;
    letter-spacing: 10px;
    margin-bottom: 20px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    gap: 15px;
}

/* BUTTON BASE */
button {
    position: relative;
    overflow: hidden;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    background: #ff4da6;
    color: white;
    font-size: 20px;
    cursor: pointer;

    box-shadow: 0 0 8px #ff69b4;
    transition: 0.2s;
}

/* HOVER */
button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff1493;
}

/* 🌈 RAINBOW CLICK */
@keyframes rainbowGlow {
    0% { box-shadow: 0 0 15px red; }
    20% { box-shadow: 0 0 15px orange; }
    40% { box-shadow: 0 0 15px yellow; }
    60% { box-shadow: 0 0 15px green; }
    80% { box-shadow: 0 0 15px blue; }
    100% { box-shadow: 0 0 15px violet; }
}

button.active {
    animation: rainbowGlow 0.6s linear;
    transform: scale(1.2);
}

/* 💥 RIPPLE EFFECT */
.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    transform: scale(0);
    animation: rippleEffect 0.6s linear;
}

@keyframes rippleEffect {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

/* ALERT */
.alert-box {
    position: absolute;
    top: 80px;
    right: 100px;
    display: none;
    z-index: 6;
}

.alert-box img {
    width: 160px;
}

/* SNOW */
.snow {
    position: fixed;
    top: -10px;
    color: white;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh); }
}

/* HEARTS */
.heart {
    position: fixed;
    color: pink;
    animation: float 5s linear infinite;
}
@keyframes float {
    to { transform: translateY(-100vh); }
}

</style>
</head>

<body>

<div class="border-img"></div>
<div class="glow-border"></div>

<div class="title">LIKE you PENGUIN 💖</div>

<div class="container">

    <div class="photo-box">
        <div class="ribbon">🎀</div>
        <img src="pass.jpeg">
        <div class="bunny">🐰</div>
    </div>

    <div class="keypad">
        <h2>Enter passcode</h2>
        <div class="display" id="display">____</div>

        <div class="buttons">
            <button onclick="press(event,1)">1</button>
            <button onclick="press(event,2)">2</button>
            <button onclick="press(event,3)">3</button>
            <button onclick="press(event,4)">4</button>
            <button onclick="press(event,5)">5</button>
            <button onclick="press(event,6)">6</button>
            <button onclick="press(event,7)">7</button>
            <button onclick="press(event,8)">8</button>
            <button onclick="press(event,9)">9</button>
            <button onclick="clearCode(event)">*</button>
            <button onclick="press(event,0)">0</button>
            <button onclick="check(event)">#</button>
        </div>
    </div>

</div>

<div class="alert-box" id="alertBox">
    <img src="pass.jpeg">
</div>

<audio id="music" src="music.mp3"></audio>

<script>
let input = "";

/* BUTTON PRESS */
function press(e, num) {
    animateButton(e);

    if (input.length < 4) {
        input += num;
        updateDisplay();
    }
    if (input.length === 4) {
        setTimeout(check, 200);
    }
}

/* RIPPLE + GLOW */
function animateButton(e) {
    let btn = e.currentTarget;

    // rainbow glow
    btn.classList.add("active");
    setTimeout(() => btn.classList.remove("active"), 600);

    // ripple
    let circle = document.createElement("span");
    circle.classList.add("ripple");

    let rect = btn.getBoundingClientRect();
    let size = Math.max(rect.width, rect.height);

    circle.style.width = circle.style.height = size + "px";
    circle.style.left = (e.clientX - rect.left - size/2) + "px";
    circle.style.top = (e.clientY - rect.top - size/2) + "px";

    btn.appendChild(circle);
    setTimeout(() => circle.remove(), 600);
}

function updateDisplay() {
    let stars = input.replace(/./g, "*");
    document.getElementById("display").innerText = stars.padEnd(4, "_");
}

function clearCode(e) {
    animateButton(e);
    input = "";
    updateDisplay();
}

function check(e) {
    if(e) animateButton(e);

    if (input === "2324") {
        window.location.href = "in.html";
    } else {
        showAlert();
    }

    input = "";
    updateDisplay();
}

function showAlert() {
    let box = document.getElementById("alertBox");
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 2000);
}

/* SNOW */
setInterval(() => {
    let snow = document.createElement("div");
    snow.className = "snow";
    snow.innerHTML = "❄";
    snow.style.left = Math.random() * window.innerWidth + "px";
    snow.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(snow);
    setTimeout(()=>snow.remove(),5000);
}, 200);

/* HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
}, 800);

</script>

</body>
</html>
